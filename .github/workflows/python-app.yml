name: Package BAAH

run-name: BAAH-${{ inputs.log }}

on:
  workflow_dispatch:
    inputs:
      log:
        description: 'log'
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.10.x

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nicegui

    - name: Run package
      run: python package.py

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v2
      with:
        name: BAAH-${{ github.sha }}
        path: |
          ./dist/main/*

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        prerelease: true
        name: "BAAH-${{ inputs.log }}"
        tag_name: "v${{ inputs.log }}"
        body: |
          BAAH-${{ inputs.log }}
        files: |
          ./dist/main/*
          LICENSE
