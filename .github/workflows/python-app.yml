name: Build and Package BAAH

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.x

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nicegui

    - name: Run package.py
      run: python package.py

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v2
      with:
        name: BAAH-${{ github.sha }}
        path: |
          ./dist/*
